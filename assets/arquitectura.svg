    <text x="110" y="56" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="800" fill="#eaf2f2">anuncios-architect</text>
  </g>

  <!-- ARRIBA: intake -->
  <g transform="translate(270,52)">
