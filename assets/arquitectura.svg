<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 520" width="1000" height="520">
  <defs>
    <linearGradient id="cgH" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00E5D0"/>
      <stop offset="100%" stop-color="#f5c451"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#14212c"/>
      <stop offset="100%" stop-color="#0c1015"/>
    </radialGradient>
    <radialGradient id="core" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#1b2a36"/>
      <stop offset="100%" stop-color="#10171f"/>
