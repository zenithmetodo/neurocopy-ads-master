  <!-- Conectores (detrás) -->
  <g stroke="#00E5D0" stroke-width="1.6" opacity="0.45">
    <!-- arriba -->
    <line x1="360" y1="92" x2="470" y2="232"/>
    <line x1="640" y1="92" x2="530" y2="232"/>
    <!-- centro a satélites -->
    <line x1="500" y1="262" x2="200" y2="200"/>
    <line x1="500" y1="262" x2="800" y2="200"/>
    <line x1="500" y1="262" x2="170" y2="300"/>
    <line x1="500" y1="262" x2="830" y2="300"/>
    <line x1="500" y1="262" x2="240" y2="392"/>
    <line x1="500" y1="262" x2="760" y2="392"/>
    <!-- abajo -->
    <line x1="470" y1="290" x2="360" y2="448"/>
    <line x1="530" y1="290" x2="640" y2="448"/>
  </g>

  <!-- NÚCLEO: orquestador -->
  <g transform="translate(390,222)">
