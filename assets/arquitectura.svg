  <g transform="translate(786,178)">
    <rect width="186" height="44" rx="12" fill="#10171f" stroke="#00E5D0" stroke-width="2"/>
    <text x="93" y="28" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#eaf2f2">formato-master-ads</text>
  </g>
  <g transform="translate(792,278)">
    <rect width="184" height="44" rx="12" fill="#10171f" stroke="#00E5D0" stroke-width="2"/>
    <text x="92" y="28" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12.5" font-weight="600" fill="#eaf2f2">asuntos-virales</text>
  </g>
  <g transform="translate(752,370)">
    <rect width="186" height="44" rx="12" fill="#10171f" stroke="#00E5D0" stroke-width="2"/>
    <text x="93" y="28" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12.5" font-weight="600" fill="#eaf2f2">objeciones-master</text>
  </g>

