  <g transform="translate(40,490)" font-family="system-ui, sans-serif" font-size="12" fill="#9fb3b3">
    <rect x="0" y="0" width="14" height="14" rx="4" fill="none" stroke="#f5c451" stroke-width="2"/>
    <text x="22" y="11" fill="#eaf2f2">Orquesta / entrada-salida</text>
    <rect x="230" y="0" width="14" height="14" rx="4" fill="none" stroke="#00E5D0" stroke-width="2"/>
