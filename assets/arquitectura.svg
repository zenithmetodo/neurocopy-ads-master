  <g transform="translate(270,448)">
    <rect width="180" height="44" rx="12" fill="#10171f" stroke="#f5c451" stroke-width="2"/>
    <text x="90" y="28" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#eaf2f2">ad-html-builder</text>
