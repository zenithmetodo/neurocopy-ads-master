<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 860" width="1280" height="860">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#070b0f"/>
      <stop offset="100%" stop-color="#0c1015"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00E5D0"/>
      <stop offset="100%" stop-color="#f5c451"/>
    </linearGradient>
    <style>
      .h{font-family:Georgia,serif;font-weight:700}
      .t{font-family:Inter,Arial,sans-serif}
      .blk{fill:#11181f;stroke:#1d2730;stroke-width:1.5;rx:14}
      .ag{fill:#0e141a;stroke:#28333d;stroke-width:1}
      .lbl{font-family:Inter,Arial,sans-serif;fill:#8089a0;font-size:11px;letter-spacing:1.5px}
      .nm{font-family:Inter,Arial,sans-serif;fill:#eaf2f2;font-size:13px;font-weight:600}
      .ds{font-family:Inter,Arial,sans-serif;fill:#7e8a98;font-size:11px}
    </style>
  </defs>

  <rect width="1280" height="860" fill="url(#bg)"/>

  <text x="640" y="56" class="h" font-size="34" fill="url(#brand)" text-anchor="middle">Arquitectura · 13 agentes en 5 fases</text>
  <text x="640" y="84" class="t" font-size="14" fill="#8089a0" text-anchor="middle">Cada agente es crack de UNA cosa · todos orquestados por el anuncios-architect</text>

  <!-- FASE 0 -->
  <g transform="translate(60,120)">
    <rect class="blk" width="1160" height="96" rx="14"/>
    <text x="20" y="30" class="lbl">FASE 0 · INTAKE / AVATAR</text>
    <rect class="ag" x="20" y="42" width="360" height="40" rx="10"/>
    <text x="36" y="60" class="nm">01 · intake-brief</text>
    <text x="36" y="76" class="ds">FASE 0 · brief + avatar-resumen.html editable</text>
    <text x="1000" y="68" class="t" font-size="13" fill="#00E5D0" text-anchor="end">→ 00-avatar-resumen/</text>
  </g>

  <!-- FASE 1 -->
  <g transform="translate(60,236)">
    <rect class="blk" width="1160" height="96" rx="14"/>
    <text x="20" y="30" class="lbl">FASE 1 · ÁNGULOS (definición exacta Zenith Crea Ofertas)</text>
    <rect class="ag" x="20" y="42" width="360" height="40" rx="10"/>
    <text x="36" y="60" class="nm">02 · angulos-importer</text>
    <text x="36" y="76" class="ds">A qué apela · Qué cree · CÓMO LO ROMPEMOS · hook</text>
    <text x="1140" y="68" class="t" font-size="13" fill="#00E5D0" text-anchor="end">→ 01-angulos/ + subcarpeta angulo-N/ANGULO.html</text>
  </g>

  <!-- FASE 2 -->
  <g transform="translate(60,352)">
    <rect class="blk" width="1160" height="288" rx="14"/>
    <text x="20" y="30" class="lbl">FASE 2 · ANUNCIOS POR ÁNGULO · 5 anuncios (2 BAJO + 2 MEDIO fuerte + 1 ALTO)</text>

    <!-- orquestador -->
    <rect x="20" y="44" width="1120" height="46" rx="10" fill="#13202a" stroke="#00E5D0" stroke-width="1.5"/>
    <text x="36" y="64" class="nm" fill="#00E5D0">03 · anuncios-architect ⭐ (Opus)</text>
    <text x="36" y="80" class="ds">orquesta los 6 especialistas · aplica reparto 2-2-1 + el puente en cada guion</text>

    <!-- 6 especialistas -->
    <g font-family="Inter,Arial,sans-serif">
      <rect class="ag" x="20"  y="104" width="270" height="58" rx="10"/>
      <text x="34" y="126" class="nm">04 · hook-master ⭐</text>
      <text x="34" y="144" class="ds">4 ganchos · 9 tipos · REGLA AVATAR</text>

      <rect class="ag" x="302" y="104" width="270" height="58" rx="10"/>
      <text x="316" y="126" class="nm">05 · formato-master-ads</text>
      <text x="316" y="144" class="ds">70+ formatos + EL DIBUJO (SVG)</text>

      <rect class="ag" x="584" y="104" width="270" height="58" rx="10"/>
      <text x="598" y="126" class="nm">06 · headline-3-tipos</text>
      <text x="598" y="144" class="ds">verbal/visual/audio + ficha técnica</text>

      <rect class="ag" x="866" y="104" width="274" height="58" rx="10"/>
      <text x="880" y="126" class="nm">07 · asuntos-virales</text>
      <text x="880" y="144" class="ds">6 cat · 3 tipos · 5 criterios</text>

      <rect class="ag" x="20"  y="174" width="270" height="58" rx="10"/>
      <text x="34" y="196" class="nm">08 · consciencia-master</text>
      <text x="34" y="214" class="ds">Schwartz + qué formato encaja</text>

      <rect class="ag" x="302" y="174" width="270" height="58" rx="10"/>
      <text x="316" y="196" class="nm">09 · objeciones-master</text>
      <text x="316" y="214" class="ds">romper objeciones (nivel ALTO)</text>

      <rect x="584" y="174" width="556" height="58" rx="10" fill="#1a1410" stroke="#f5c451" stroke-width="1.5"/>
      <text x="598" y="196" class="nm" fill="#f5c451">10 · ad-html-builder ⭐</text>
      <text x="598" y="214" class="ds">maqueta ANUNCIO-N.html doc-guion editable + PDF + dibujo</text>
    </g>

    <text x="1140" y="264" class="t" font-size="13" fill="#00E5D0" text-anchor="end">→ angulo-N/ANUNCIO-1..5.html + .md</text>
  </g>

  <!-- FASE 3 -->
  <g transform="translate(60,660)">
    <rect class="blk" width="1160" height="96" rx="14"/>
    <text x="20" y="30" class="lbl">FASE 3 · OUTPUT</text>
    <rect class="ag" x="20" y="42" width="360" height="40" rx="10"/>
    <text x="36" y="60" class="nm">11 · output-architect-ads</text>
    <text x="36" y="76" class="ds">.docx por subcarpeta + verificación final</text>
    <text x="1140" y="68" class="t" font-size="13" fill="#00E5D0" text-anchor="end">→ GUIONES_ANGULO_N.docx + QA</text>
  </g>

  <!-- delegación imágenes -->
  <g transform="translate(60,780)">
    <rect width="1160" height="52" rx="12" fill="#160f12" stroke="#3a2230" stroke-width="1.5"/>
    <text x="20" y="32" class="t" font-size="13" fill="#cda">🎨 IMÁGENES → siempre delegadas a <tspan fill="#f5c451" font-weight="700">neurocopy-image-ads-master</tspan> · aquí solo se hacen guiones de vídeo</text>
  </g>
</svg>
