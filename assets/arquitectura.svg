    <text x="90" y="28" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#eaf2f2">intake-brief</text>
  </g>
  <g transform="translate(560,52)">
    <rect width="180" height="44" rx="12" fill="#10171f" stroke="#00E5D0" stroke-width="2"/>
    <text x="90" y="28" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#eaf2f2">angulos-importer</text>
