    <text x="101" y="34" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="800" fill="#f5c451">2 &#183; &#193;NGULOS</text>
    <text x="101" y="62" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#eaf2f2">Def. exacta Zenith</text>
    <text x="101" y="82" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#eaf2f2">tipo + creencia</text>
