<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#070b0f"/>
      <stop offset="100%" stop-color="#0c1015"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00E5D0"/>
      <stop offset="100%" stop-color="#f5c451"/>
    </linearGradient>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#00E5D0"/>
    </marker>
    <style>
      .h{font-family:Georgia,serif;font-weight:700}
      .t{font-family:Inter,Arial,sans-serif}
      .step{fill:#11181f;stroke:#1d2730;stroke-width:1.5}
      .num{font-family:Georgia,serif;font-weight:700;fill:#00E5D0}
      .ttl{font-family:Inter,Arial,sans-serif;fill:#eaf2f2;font-weight:700;font-size:15px}
      .sub{font-family:Inter,Arial,sans-serif;fill:#8089a0;font-size:12px}
    </style>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <text x="640" y="52" class="h" font-size="32" fill="url(#brand)" text-anchor="middle">Pipeline · de la oferta al anuncio grabable</text>
  <text x="640" y="80" class="t" font-size="14" fill="#8089a0" text-anchor="middle">Entrega por carpetas ordenadas · igual que Zenith Crea Ofertas</text>

  <!-- pasos verticales -->
  <g>
    <!-- 0 -->
    <rect class="step" x="120" y="110" width="1040" height="74" rx="14"/>
    <text x="150" y="158" class="num" font-size="30">0</text>
    <text x="195" y="143" class="ttl">INTAKE / AVATAR</text>
    <text x="195" y="166" class="sub">nicho · avatar · producto · promesa · plataforma · formatos grabables · CTA</text>
    <rect x="900" y="132" width="240" height="32" rx="8" fill="#13202a" stroke="#00E5D0"/>
    <text x="1020" y="153" class="t" font-size="12" fill="#00E5D0" text-anchor="middle">00-avatar-resumen/</text>

    <line x1="640" y1="184" x2="640" y2="206" stroke="#00E5D0" stroke-width="2" marker-end="url(#arr)"/>

    <!-- 1 -->
    <rect class="step" x="120" y="208" width="1040" height="74" rx="14"/>
    <text x="150" y="256" class="num" font-size="30">1</text>
    <text x="195" y="241" class="ttl">ÁNGULOS · definición exacta Crea Ofertas</text>
    <text x="195" y="264" class="sub">tipo de persona + creencia + cómo lo rompemos + hook + sub-ángulos · 3-4 por defecto</text>
    <rect x="852" y="230" width="288" height="32" rx="8" fill="#13202a" stroke="#00E5D0"/>
    <text x="996" y="251" class="t" font-size="12" fill="#00E5D0" text-anchor="middle">01-angulos/angulo-N/ANGULO.html</text>

    <line x1="640" y1="282" x2="640" y2="304" stroke="#00E5D0" stroke-width="2" marker-end="url(#arr)"/>

    <!-- 2 -->
    <rect x="120" y="306" width="1040" height="200" rx="14" fill="#11181f" stroke="#f5c451" stroke-width="1.6"/>
    <text x="150" y="350" class="num" font-size="30" fill="#f5c451">2</text>
    <text x="195" y="335" class="ttl">5 ANUNCIOS POR ÁNGULO</text>
    <text x="195" y="357" class="sub">cada anuncio: nivel + formato con dibujo + 4 ganchos (regla avatar) + headline 3 tipos + cuerpo con puente + CTA</text>

    <!-- 5 tarjetas de nivel -->
    <g font-family="Inter,Arial,sans-serif" text-anchor="middle">
      <rect x="150"  y="380" width="180" height="100" rx="12" fill="#0e141a" stroke="#00E5D0"/>
      <text x="240" y="408" font-size="13" font-weight="700" fill="#00E5D0">ANUNCIO 1</text>
      <text x="240" y="430" font-size="12" fill="#8089a0">NIVEL BAJO</text>
      <text x="240" y="452" font-size="10.5" fill="#6b7588">escalera · POV</text>
      <text x="240" y="470" font-size="10.5" fill="#6b7588">síntomas/creencias</text>

      <rect x="346"  y="380" width="180" height="100" rx="12" fill="#0e141a" stroke="#00E5D0"/>
      <text x="436" y="408" font-size="13" font-weight="700" fill="#00E5D0">ANUNCIO 2</text>
      <text x="436" y="430" font-size="12" fill="#8089a0">NIVEL BAJO</text>
      <text x="436" y="452" font-size="10.5" fill="#6b7588">cajetilla IG</text>
      <text x="436" y="470" font-size="10.5" fill="#6b7588">talking-head ok</text>

      <rect x="542"  y="380" width="180" height="100" rx="12" fill="#0e141a" stroke="#f5c451"/>
      <text x="632" y="408" font-size="13" font-weight="700" fill="#f5c451">ANUNCIO 3</text>
      <text x="632" y="430" font-size="12" fill="#8089a0">NIVEL MEDIO</text>
      <text x="632" y="452" font-size="10.5" fill="#6b7588">versus · ticket</text>
      <text x="632" y="470" font-size="10.5" fill="#6b7588">con vs sin</text>

      <rect x="738"  y="380" width="180" height="100" rx="12" fill="#0e141a" stroke="#f5c451"/>
      <text x="828" y="408" font-size="13" font-weight="700" fill="#f5c451">ANUNCIO 4</text>
      <text x="828" y="430" font-size="12" fill="#8089a0">NIVEL MEDIO</text>
      <text x="828" y="452" font-size="10.5" fill="#6b7588">etiqueta · demo</text>
      <text x="828" y="470" font-size="10.5" fill="#6b7588">mecanismo</text>

      <rect x="934"  y="380" width="180" height="100" rx="12" fill="#0e141a" stroke="#e0566b"/>
      <text x="1024" y="408" font-size="13" font-weight="700" fill="#e0566b">ANUNCIO 5</text>
      <text x="1024" y="430" font-size="12" fill="#8089a0">NIVEL ALTO</text>
      <text x="1024" y="452" font-size="10.5" fill="#6b7588">antes/después</text>
      <text x="1024" y="470" font-size="10.5" fill="#6b7588">prueba · objeciones</text>
    </g>

    <line x1="640" y1="506" x2="640" y2="528" stroke="#00E5D0" stroke-width="2" marker-end="url(#arr)"/>

    <!-- 3 -->
    <rect class="step" x="120" y="530" width="1040" height="74" rx="14"/>
    <text x="150" y="578" class="num" font-size="30">3</text>
    <text x="195" y="563" class="ttl">OUTPUT · .docx + verificación</text>
    <text x="195" y="586" class="sub">GUIONES_ANGULO_N.docx por subcarpeta + QA (200+ checks): badge nivel · dibujo · puente · editable</text>
    <rect x="860" y="552" width="280" height="32" rx="8" fill="#13202a" stroke="#00E5D0"/>
    <text x="1000" y="573" class="t" font-size="12" fill="#00E5D0" text-anchor="middle">GUIONES_ANGULO_N.docx</text>
  </g>

  <!-- entrega final -->
  <g transform="translate(120,628)">
    <rect width="1040" height="54" rx="12" fill="#13202a" stroke="#00E5D0" stroke-width="1.5"/>
    <text x="24" y="33" class="t" font-size="13.5" fill="#eaf2f2">📦 ENTREGA: cada anuncio en <tspan fill="#00E5D0" font-weight="700">HTML editable + PDF + .md + .docx</tspan> · español de España · listo para grabar con iPhone</text>
  </g>
</svg>
