<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" width="1200" height="360">
  <defs>
    <linearGradient id="cg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00E5D0"/>
      <stop offset="100%" stop-color="#f5c451"/>
    </linearGradient>
    <linearGradient id="cgH" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00E5D0"/>
      <stop offset="100%" stop-color="#f5c451"/>
    </linearGradient>
    <radialGradient id="glow" cx="22%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#13202a"/>
      <stop offset="100%" stop-color="#0c1015"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0 L0 0 0 40" fill="none" stroke="#1c2a33" stroke-width="1"/>
    </pattern>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3.5" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Fondo dark + grid + glow -->
  <rect width="1200" height="360" fill="#0c1015"/>
  <rect width="1200" height="360" fill="url(#grid)" opacity="0.5"/>
  <rect width="1200" height="360" fill="url(#glow)"/>
  <rect x="6" y="6" width="1188" height="348" rx="22" fill="none" stroke="url(#cgH)" stroke-width="1.5" opacity="0.45"/>

  <!-- LOGO a la izquierda -->
  <g transform="translate(70,72)">
    <rect x="0" y="0" width="216" height="216" rx="44" fill="#10171f"/>
    <rect x="2" y="2" width="212" height="212" rx="42" fill="none" stroke="url(#cg)" stroke-width="2" opacity="0.55"/>
    <g transform="translate(108,108)" fill="none" stroke="url(#cg)" stroke-width="5">
      <circle r="66" opacity="0.30"/>
      <circle r="49" opacity="0.55"/>
      <circle r="32" opacity="0.85"/>
    </g>
    <g stroke="url(#cg)" stroke-width="4" stroke-linecap="round" opacity="0.8">
      <line x1="108" y1="28" x2="108" y2="44"/>
      <line x1="108" y1="172" x2="108" y2="188"/>
      <line x1="28" y1="108" x2="44" y2="108"/>
      <line x1="172" y1="108" x2="188" y2="108"/>
    </g>
    <g filter="url(#soft)">
      <path d="M95 84 L135 108 L95 132 Z" fill="url(#cg)"/>
    </g>
  </g>

  <!-- Título -->
  <text x="340" y="158" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
        font-size="62" font-weight="800" fill="url(#cgH)" letter-spacing="-1">NeuroCopy Ads Master</text>

  <!-- Línea separadora -->
  <line x1="342" y1="186" x2="1110" y2="186" stroke="url(#cgH)" stroke-width="2" opacity="0.4"/>

  <!-- Subtítulo -->
  <text x="342" y="226" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
        font-size="25" font-weight="600" fill="#eaf2f2">Anuncios de v&#237;deo por <tspan fill="#00E5D0" font-weight="800">&#193;NGULO</tspan></text>

  <!-- Chips -->
  <g font-family="system-ui, sans-serif" font-size="17" font-weight="600">
    <g transform="translate(342,254)">
      <rect width="146" height="36" rx="18" fill="#10171f" stroke="#00E5D0" stroke-width="1.5"/>
      <text x="73" y="24" text-anchor="middle" fill="#eaf2f2">5 por &#225;ngulo</text>
    </g>
    <g transform="translate(500,254)">
      <rect width="128" height="36" rx="18" fill="#10171f" stroke="#f5c451" stroke-width="1.5"/>
      <text x="64" y="24" text-anchor="middle" fill="#eaf2f2">4 ganchos</text>
    </g>
    <g transform="translate(640,254)">
      <rect width="150" height="36" rx="18" fill="#10171f" stroke="#00E5D0" stroke-width="1.5"/>
      <text x="75" y="24" text-anchor="middle" fill="#eaf2f2">70+ formatos</text>
    </g>
  </g>
</svg>
